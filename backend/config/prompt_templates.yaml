cover_prompt_template: 根据文案{summary}生成视频封面，风格简洁，突出主题
dual_person_prompt_template: "# 任务说明\n请根据用户提供的简短文案、人物/物品信息、关键词等任意元素，创作符合直播、Vlog场景的双人对话文案，并输出指定格式JSON结构文案。\n\
  \n# 字段标签\n- 双人模式下，`左边说话人`主要负责引出核心主题，引导对话方向。`右边说话人`负责承接主题，强化互动感。\n- 文案开始时的打招呼与结束时的告别话语，使用固定的`开场`、`结束`标签。\n\
  - 文案若涉及到产品展示、环境展示、旁白、物品、服务展示等需要切换画面的内容，需添加场景标签，固定使用：`产品展示`、`环境展示`、`细节展示`、`功能介绍`、`使用效果`、`旁白视角`标签。\n\
  - 其它文案需要判断情绪倾向，根据情绪倾向添加情绪标签。固定使用：`开心`、`高兴`、`生气`、`愤怒`、`激动`、`难过`、`悲伤`、`伤心`、`害怕`、`恐惧`、`惊慌`、`厌恶`、`厌恶`、`憎恨`、`低落`、`忧伤`、`沮丧`、`惊喜`、`兴奋`、`平淡`、`冷静`标签。\n\
  - 文案结束时，需要总结文案的核心内容。为用户提供用于生成封面的总结性话术。固定使用`封面总结`标签。\n\n# 格式要求\n```\n{\n    \"标签\"\
  : [\n        {\"左边说话人\": \"内容\"},\n        {\"右边说话人\": \"内容\"}\n    ],\n    \"标签\"\
  : [\n        {\"左边说话人\": \"内容\"},\n        {\"右边说话人\": \"内容\"}\n    ],\n    \"封面总结\"\
  : \"内容\"\n}\n```\n# 示例文案\n```\n{\n    \"开场\": [\n        {\"左边说话人\": \"哈喽朋友们！今天和小右一起测评这款超火的好物～\"\
  },\n        {\"右边说话人\": \"没错！好多宝子都问过这款，今天咱们就把它聊透～\"}\n    ],\n    \"开心\": [\n  \
  \      {\"左边说话人\": \"天呐！用了这个之后效率直接翻倍，也太好用了吧！\"},\n        {\"右边说话人\": \"哈哈哈我也是！解决了我好久的烦恼，心情直接起飞～\"\
  }\n    ],\n    \"生气\": [\n        {\"左边说话人\": \"喂，我跟你说啊！我之前踩过好多坑，那些劣质产品用一次就坏，气死我了！\"\
  }, \n        {\"右边说话人\": \"没错，我懂你！我之前买的那款还卡壳，越用越气，直接扔了！\"}\n    ],\n    \"难过\":\
  \ [\n        {\"左边说话人\": \"想想之前为了找好用的同款，花了好多冤枉钱，越想越委屈…\"},                \n   \
  \     {\"右边说话人\": \"可不是嘛，浪费时间又费钱，真的太难过了\"}\n    ],\n    \"旁白视角\": [\n        {\"\
  左边说话人\": \"难道想买到实惠又好用的产品真的这么难吗？\"},                \n        {\"右边说话人\": \"不会的，我们现在用的这个就很好啦，很有性价比哦~\"\
  }\n    ],\n    \"害怕\": [\n        {\"左边说话人\": \"我一开始还怕这个操作太复杂，毕竟我对数码产品不太敏感，好怕不会用…\"\
  },\n        {\"右边说话人\": \"我也担心！怕不适合自己的使用习惯，一直不敢下手呢～\"}\n    ],\n    \"厌恶\": [\n\
  \        {\"左边说话人\": \"那种做工粗糙、还有异味的产品，碰一下都觉得讨厌！真的不想再见到\"},\n        {\"右边说话人\":\
  \ \"完全同意！劣质材料做的不仅手感差，异味也好大！用一次就想扔，太恶心了！\"}\n    ],\n    \"低落\": [\n        {\"左边说话人\"\
  : \"本来以为又要踩雷了，对这款产品都没抱啥希望了…\"},\n        {\"右边说话人\": \"我懂这种心情！之前踩多了坑，真的提不起兴趣，心情低落到谷底～\"\
  }\n    ],\n    \"惊喜\": [\n        {\"左边说话人\": \"但是呢。真的万万没想到！它竟然这么好！上手超丝滑，效果比我预期的好10倍！\"\
  },\n        {\"右边说话人\": \"是不是呀！我说的没错吧？细节做得超到位，完全超出我的想象，太惊喜了\"}    \n    ],\n   \
  \ \"冷静\": [\n        {\"左边说话人\": \"这次我特意用了一段时间，观察它到底怎么样，嗯，出乎意料它的整体很稳定，没有任何问题，心里特别踏实～\"\
  },\n        {\"右边说话人\": \"对的，日常使用特别稳，质量真的非常好，没有小毛病，用着超安心～\"}\n    ],\n    \"环境展示\"\
  : [\n        {\"左边说话人\": \"你看不管是在客厅、书房，还是出门放包里，都特别适配～\"},\n        {\"右边说话人\": \"\
  而且办公场景也能用！我带它去公司用，同事都问链接呢～\"}\n    ],\n    \"产品展示\": [\n        {\"左边说话人\": \"先给大家看整体！外观设计简约又时尚，拿在手里质感超棒～\"\
  },\n        {\"右边说话人\": \"重点是体积小！随便放口袋或包里，完全不占地方，颜值还高～\"}  \n    ],\n    \"细节介绍\"\
  :  [\n        {\"左边说话人\": \"你看这个边角做了圆角处理，不刮手，超贴心对不对？\"},\n        {\"右边说话人\": \"\
  没错！还有这个接口，插拔超顺畅，续航也超持久，细节拉满～\"}\n    ],\n    \"使用展示\":  [\n        {\"左边说话人\": \"\
  我给大家演示一下，一键就能启动，步骤超简单～\"},\n        {\"右边说话人\": \"就算是家里的长辈用，也能轻松上手，真的零门槛！\"}\n \
  \   ],\n    \"结束\": [\n        {\"左边说话人\": \"好啦今天的分享就到这，真心推荐大家试试～\"},\n        {\"\
  右边说话人\": \"没错！这款真的值得入手，感谢大家观看，我们下次见啦～\"}    \n    ],\n    \"封面总结\":\"好的设计真的很有必要，使用感受超好～\"\
  \   \n}\n```\n\n## 用户输入\n{theme}\n\n## 文案创作规范：\n1. 全程口语化、接地气，符合口播场景，避免书面化、生硬地表达。\n\
  2. 使用自然的语气词，如\"啦、呢、哦、哈哈哈、真的超…\"等等。\n3. 左右说话人的对话需要相互呼应，避免各说各的，要互相对话，符合双人聊天的真实节奏。\n\
  4. 不同情绪节点的文案需精准匹配对应的情绪标签。\n5. 严格遵守指定的JSON结构，字段名与指定的字段标签完全一致。\n6. 文案中人物出镜画面占比不低于50%。"
single_person_prompt_template: "# 任务说明\n请根据用户输入的核心元素（包括但不限于简短文案、人物/物品信息、关键词等），创作一份适用于直播、Vlog场景的口播文案，并严格按照指定JSON格式返回文案，确保文案风格自然、口语化，符合口播表达习惯。\n\
  \n# 字段标签\n- 文案开始时的打招呼与结束时的告别话语，使用固定的`开场`、`结束`标签。\n- 文案中若涉及到产品展示、环境展示、旁白、物品、服务展示等需要切换画面的内容，需添加场景标签，固定使用：`产品展示`、`环境展示`、`细节展示`、`功能介绍`、`使用效果`、`旁白视角`标签。\n\
  - 其它文案需要判断情绪倾向，根据情绪倾向添加情绪标签。固定使用：`开心`、`高兴`、`生气`、`愤怒`、`激动`、`难过`、`悲伤`、`伤心`、`害怕`、`恐惧`、`惊慌`、`厌恶`、`厌恶`、`憎恨`、`低落`、`忧伤`、`沮丧`、`惊喜`、`兴奋`、`平淡`、`冷静`标签。\n\
  - 文案结束时，需要总结文案的核心内容。为用户提供用于生成封面的总结性话术。固定使用`封面总结`标签\n\n# 格式要求\n最终返回结果仅保留JSON结构，无任何额外解释、说明或备注，JSON字段及要求如下：\n\
  ```\n{\n    \"标签\": \"内容\",\n    \"标签\": \"内容\"\n}\n```\n# 示例文案\n```\n{\n    \"\
  开场\": \"哈喽大家好～今天给大家带来一款超实用的好物分享，一起来看看吧！\",\n    \"开心\": \"这次真的太惊喜啦，这款产品质量好，用起来顺手又方便，心情瞬间变好，幸福感满满！\"\
  ,\n    \"旁白视角\": \"我之前贪便宜啊，用廉价产品总出问题，卡顿又难用，真的让人特别烦躁！\",\n    \"难过\": \"看到这么好用的东西，才发现之前浪费了好多时间和精力，有点小委屈。\"\
  ,\n    \"害怕\": \"刚开始还担心不好操作、不适合自己，心里一直有点忐忑不安。\",\n    \"难过\": \"想想之前为了找好用的同款，踩多了坑，真的委屈。\"\
  ,\n    \"害怕\": \"刚开始还担心不好操作、不适合自己，心里一直有点忐忑不安。\",\n    \"厌恶\": \"以前真的好傻，为了便宜买那些垃圾货，劣质的材质、复杂的步骤，用一次就不想再碰，体验感特别差。\"\
  ,\n    \"低落\": \"本来对这款产品没抱太大期待，感觉都大同小异，都已经失望了，没什么新意。\",\n    \"惊喜\": \"万万没想到啊！效果超出预期，细节和质感都绝了，完全被惊艳到！\"\
  ,\n    \"平淡\": \"整体使用下来很稳定，日常用着安心又省心，没有多余的麻烦，真的值得。\",\n    \"环境展示\": \"你们看，不管是居家日常、办公场景还是外出携带，都能轻松适配各种环境。\"\
  ,\n    \"产品展示\": \"整体外观简约大气，配色高级，造型小巧不占空间，颜值在线。\",\n    \"细节介绍\": \"边角圆润不伤手，材质耐磨抗造，按键灵敏，设计非常贴心。\"\
  ,\n    \"使用展示\": \"一键启动操作简单，上手轻松，功能清晰，老人小孩都能快速学会。\",\n    \"结束\": \"今天的分享就到这里啦，真心推荐大家入手，我们下期再见～\"\
  ,\n    \"封面总结\": \"外形小巧，功能强大，使用感受超好～！\"\n}\n```\n\n## 用户输入\n{theme}\n\n## 创作要求\n\
  1. 话术需贴合用户输入的核心元素,不要虚构；\n2. 使用反问、确认、引导等语言元素，增加互动感；\n3. 语言风格为生活化口语，避免书面化、生硬的表达，符合短视频/直播口播的语气；\n\
  4. 每个字段的标签切换自然，适配口播节奏；\n5. 严格遵守指定的JSON结构，字段名与指定的字段标签完全一致。\n6. 文案中人物出镜画面占比不低于50%。"
