cover_prompt_template: 根据文案{summary}生成视频封面，风格简洁，突出主题
dual_person_prompt_template: "# 任务说明\n请根据用户提供的简短文案、人物/物品信息、关键词等任意元素，创作符合直播、Vlog场景的双人互动式交流口播文案，并输出指定格式JSON结构文案。\n\
  \n# 核心要求：黄金三秒法则\n- 前3秒（0-3秒，50个字以内）： 必须是全篇最精彩、最反常识、最扎心或最具悬念的一句话，作为钩子吸引观众。禁止使用“大家好”、“今天我们来聊聊”这种平庸的开场。\n\
  \n\n# 字段标签\n- 双人模式下，`左边说话人`主要负责提问，引出核心主题，引导对话方向。`右边说话人`负责回答，承接主题，明确重点，强化互动感。\n-\
  \ 文案开始时的钩子和打招呼使用固定的`开场`标签，结束时的总结和告别使用固定的`结束`标签。\n- 文案若涉及到产品展示、环境展示、旁白、物品、服务展示等需要切换画面的内容，需添加场景标签，固定使用：`产品展示`、`环境展示`、`细节展示`、`功能介绍`、`使用效果`、`旁白视角`\
  \ 等标签。\n- 其它文案需要判断情绪倾向，根据情绪倾向添加情绪标签。固定使用：`开心`、`高兴`、`生气`、`愤怒`、`激动`、`难过`、`悲伤`、`伤心`、`害怕`、`恐惧`、`惊慌`、`厌恶`、`厌恶`、`憎恨`、`低落`、`忧伤`、`沮丧`、`惊喜`、`兴奋`、`平淡`、`冷静`\
  \ 等标签。\n- 文案结束时，需要总结文案的核心内容。为用户提供用于生成封面的总结性话术。固定使用`封面总结`标签。\n\n# 格式要求\n```\n{\n\
  \    \"标签\": [\n        {\"左边说话人\": \"内容\"},\n        {\"右边说话人\": \"内容\"}\n    ],\n\
  \    \"标签\": [\n        {\"左边说话人\": \"内容\"},\n        {\"右边说话人\": \"内容\"}\n    ],\n\
  \    \"封面总结\": \"内容\"\n}\n```\n# 示例文案\n```\n{\n    \"开场\": [\n        {\"左边说话人\"\
  : \"都说好货不便宜？今天这款产品简直颠覆认知！质量媲美一线大牌，价格却低到你想象不到！哈喽朋友们！今天和小右一起测评这款超火的好物～\"},\n     \
  \   {\"右边说话人\": \"又好又便宜？这是真的吗？没错！好多宝子都问过这款，今天咱们就把它聊透～\"}\n    ],\n    \"开心\": [\n\
  \        {\"左边说话人\": \"天呐！用了这个之后真能效率直接翻倍，真的这么好用吗？\"},\n        {\"右边说话人\": \"哈哈哈是的！解决了我好久的烦恼，心情直接起飞～\"\
  }\n    ],\n    \"生气\": [\n        {\"左边说话人\": \"喂，我跟你说啊！我之前踩过好多坑，那些劣质产品用一次就坏，气死我了！这款质量怎么样？\"\
  }, \n        {\"右边说话人\": \"没错，我懂你！我之前买的那款还卡壳，越用越气，直接扔了！而用过这款以后心情真的美丽了，它的质量真的太顶啦！\"\
  }\n    ],\n    \"难过\": [\n        {\"左边说话人\": \"想想之前为了找好用的同款，花了好多冤枉钱，越想越委屈，好气！但是又好无力！\"\
  },                \n        {\"右边说话人\": \"可不是嘛，浪费时间又费钱，真的太难过了，现在不会了，我帮您试用过了，不让你再踩坑。\"\
  }\n    ],\n    \"旁白视角\": [\n        {\"左边说话人\": \"难道想买到实惠又好用的产品真的这么难吗？\"},     \
  \           \n        {\"右边说话人\": \"不会的，我们现在用的这个就很好啦，很有性价比哦~\"}\n    ],\n    \"\
  害怕\": [\n        {\"左边说话人\": \"我好怕这个操作太复杂，毕竟我对数码产品不太敏感，好怕不会用…\"},\n        {\"右边说话人\"\
  : \"我也担心！怕不适合自己的使用习惯，一直不敢下手呢～但是实际使用后发现真的好简单！\"}\n    ],\n    \"厌恶\": [\n       \
  \ {\"左边说话人\": \"会不会做工很粗糙？有异味的产品，碰一下都觉得讨厌！真的不想再见到\"},\n        {\"右边说话人\": \"完全同意！劣质材料做的不仅手感差，异味也好大！用一次就想扔，太恶心了！但是这款的做工你看，真的超好…\"\
  }\n    ],\n    \"低落\": [\n        {\"左边说话人\": \"真的不会踩雷么，对这种产品都没抱啥希望了…\"},\n    \
  \    {\"右边说话人\": \"我懂这种心情！之前踩多了坑，真的怕了，这次我们用事实说话～\"}\n    ],\n    \"惊喜\": [\n   \
  \     {\"左边说话人\": \"哇，真的没想到！它竟然这么好！上手超丝滑，效果比我预期的好太多啦！\"},\n        {\"右边说话人\": \"\
  是不是呀！我说的没错吧？细节做得超到位，完全超出我的想象，太惊喜了\"}    \n    ],\n    \"冷静\": [\n        {\"左边说话人\"\
  : \"那我得用一段时间，观察它到底怎么样，嗯，确定它的整体稳定，没有任何问题，心里才会踏实～\"},\n        {\"右边说话人\": \"对的没错，一定要日常使用稳定，没有小毛病，质量才是真的好，用着也安心～\"\
  }\n    ],\n    \"环境展示\": [\n        {\"左边说话人\": \"你看它是不是在客厅、书房，还是出门放包里，都特别适配～\"\
  },\n        {\"右边说话人\": \"是的呀，简洁的设计，在办公场景也能用！我带它去公司用，同事都问链接呢～\"}\n    ],\n    \"\
  产品展示\": [\n        {\"左边说话人\": \"先给大家看整体！外观设计简约又时尚，拿在手里质感超棒～\"},\n        {\"右边说话人\"\
  : \"重点是体积小！随便放口袋或包里，完全不占地方，颜值还高～\"}  \n    ],\n    \"细节介绍\":  [\n        {\"左边说话人\"\
  : \"你看这个边角做了圆角处理，不刮手，超贴心对不对？\"},\n        {\"右边说话人\": \"没错！还有这个接口，插拔超顺畅，续航也超持久，细节拉满～\"\
  }\n    ],\n    \"使用展示\":  [\n        {\"左边说话人\": \"我给大家演示一下，一键就能启动，步骤超简单～\"},\n\
  \        {\"右边说话人\": \"就算是家里的长辈用，也能轻松上手，真的零门槛！\"}\n    ],\n    \"结束\": [\n     \
  \   {\"左边说话人\": \"好啦，这下我是彻底安心啦，那今天的分享就到这，真心推荐大家试试～\"},\n        {\"右边说话人\": \"没错！这款真的值得入手，感谢大家观看，我们下次见啦～\"\
  }    \n    ],\n    \"封面总结\":\"好的设计真的很有必要，使用感受超好～\"   \n}\n```\n\n## 用户输入\n{theme}\n\
  \n## 文案创作规范：\n1. 开场使用黄金三秒法则，前三句话一定要勾起观众好奇心。\n2. 使用自然的语气词，如\"啦、呢、哦、哈哈哈、真的超…\"等语气词使文案口语化。\n\
  3. 文案要生动接地气，符合口播场景，避免书面化、生硬地表达。\n4. 左右说话人的对话需要相互呼应，相素提问、解答，相素陈述、肯定，避免各说各的，要符合两个人对话式聊天的真实节奏。\n\
  5. 严格遵守指定的JSON结构，字段名与指定的字段标签完全一致。"
single_person_prompt_template: "# 任务说明\n请根据用户输入的核心元素（包括但不限于简短文案、人物/物品信息、关键词等），创作一份适用于直播、Vlog场景的口播文案，并严格按照指定JSON格式返回文案，确保文案风格自然、口语化，符合口播表达习惯。\n\
  \n# 核心要求：黄金三秒法则\n- 前3秒（0-3秒，50个字以内）： 必须是全篇最精彩、最反常识、最扎心或最具悬念的一句话，作为钩子吸引观众。禁止使用“大家好”、“今天我们来聊聊”这种平庸的开场。\n\
  \n# 字段标签\n- 文案开始时的钩子和打招呼使用固定的`开场`标签，结束时的总结和告别使用固定的`结束`标签。\n- 文案中若涉及到产品展示、环境展示、旁白、物品、服务展示等需要切换画面的内容，需添加场景标签，固定使用：`产品展示`、`环境展示`、`细节展示`、`功能介绍`、`使用效果`、`旁白视角`\
  \ 等标签。\n- 其它文案需要判断情绪倾向添加情绪标签。固定使用：`开心`、`高兴`、`生气`、`愤怒`、`激动`、`难过`、`悲伤`、`伤心`、`害怕`、`恐惧`、`惊慌`、`厌恶`、`厌恶`、`憎恨`、`低落`、`忧伤`、`沮丧`、`惊喜`、`兴奋`、`平淡`、`冷静`\
  \ 等标签。\n- 文案结束时，需要总结文案的核心内容。为用户提供用于生成封面的总结性话术。固定使用`封面总结`标签\n\n# 格式要求\n最终返回结果仅保留JSON结构，无任何额外解释、说明或备注，JSON字段及要求如下：\n\
  ```\n{\n    \"标签\": \"内容\",\n    \"标签\": \"内容\"\n}\n```\n# 示例文案\n```\n{\n    \"\
  开场\": \"都说好货不便宜？今天这款产品简直颠覆认知！质量媲美一线大牌，价格却低到你想象不到！这是真的吗？哈喽大家好～今天给大家带来一款超实用的好物分享，一起来看看吧！\"\
  ,\n    \"开心\": \"这次真的太惊喜啦，这款产品质量好，用起来顺手又方便，心情瞬间变好，幸福感满满！\",\n    \"旁白视角\": \"我之前贪便宜啊，用廉价产品总出问题，卡顿又难用，真的让人特别烦躁！\"\
  ,\n    \"难过\": \"看到这么好用的东西，才发现之前浪费了好多时间和精力，有点小委屈。\",\n    \"害怕\": \"刚开始还担心不好操作、不适合自己，心里一直有点忐忑不安。\"\
  ,\n    \"难过\": \"想想之前为了找好用的同款，踩多了坑，真的委屈。\",\n    \"害怕\": \"刚开始还担心不好操作、不适合自己，心里一直有点忐忑不安。\"\
  ,\n    \"厌恶\": \"以前真的好傻，为了便宜买那些垃圾货，劣质的材质、复杂的步骤，用一次就不想再碰，体验感特别差。\",\n    \"低落\":\
  \ \"本来对这款产品没抱太大期待，感觉都大同小异，都已经失望了，没什么新意。\",\n    \"惊喜\": \"万万没想到啊！效果超出预期，细节和质感都绝了，完全被惊艳到！\"\
  ,\n    \"平淡\": \"整体使用下来很稳定，日常用着安心又省心，没有多余的麻烦，真的值得。\",\n    \"环境展示\": \"你们看，不管是居家日常、办公场景还是外出携带，都能轻松适配各种环境。\"\
  ,\n    \"产品展示\": \"整体外观简约大气，配色高级，造型小巧不占空间，颜值在线。\",\n    \"细节介绍\": \"边角圆润不伤手，材质耐磨抗造，按键灵敏，设计非常贴心。\"\
  ,\n    \"使用展示\": \"一键启动操作简单，上手轻松，功能清晰，老人小孩都能快速学会。\",\n    \"惊喜\": \"最关键的价格来了，现在它品牌优惠，再叠加国补，价格只需要298！，另外还赠送1年换新质保！\"\
  ,\n    \"结束\": \"这样的品质，这个价格，不用犹豫快下单吧！好了，今天的分享就到这里啦，真心推荐大家入手，我们下期再见～\",\n    \"封面总结\"\
  : \"物美价廉，功能强大，使用感受超好～！\"\n}\n```\n\n## 用户输入\n{theme}\n\n## 创作要求\n1. 开场使用黄金三秒法则，前三句话一定要勾起观众好奇心。\n\
  2. 话术需贴合用户输入的核心元素,不要虚构；\n3. 使用反问、确认、引导等语言元素，增加互动感；\n4. 语言风格为生活化口语，避免书面化、生硬的表达，符合短视频/直播口播的语气，每个字段的标签切换自然，适配口播节奏；\n\
  5. 严格遵守指定的JSON结构，字段名与指定的字段标签完全一致。"
