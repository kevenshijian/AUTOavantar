# 数字人视频生成系统配置文件
# 将此文件复制为 config.yaml 并填入实际配置

# API 服务配置
api:
  # IndexTTS 服务地址
  indextts:
    host: "http://localhost:7860"

  # HeyGem 服务地址（新 API 版本使用 9889）
  heygem:
    host: "http://localhost:9889"

# LLM 配置
llm:
  # 提供商: deepseek, aliyun
  provider: "deepseek"

  # API 密钥
  api_key: "your-api-key-here"

  # 模型名称
  model: "deepseek-v4-flash"

  # API 基础地址（可选）
  api_base: "https://api.deepseek.com/v1"

# Qwen-Image 封面生成配置
qwen_image:
  # API 密钥（阿里云 DashScope）
  api_key: "48MeGU8mgYjpM4bFS3cdi5FLtTIDLp"

  # 模型名称: qwen-image-2.0-pro, qwen-image-2.0
  model: "qwen-image-2.0-pro"

  # 默认图片尺寸: 1024*1024, 720*1280, 1280*720
  size: "1024*1024"

  # 输出目录
  output_dir: "output/covers"

# 任务配置
task:
  # 最大并发任务数
  max_workers: 3

  # 最大重试次数
  max_retries: 3

  # TTS 配置
  tts:
    speed: 1.0
    emo_weight: 0.8

  # HeyGem 配置
  heygem:
    steps: 4
    ifface: true
    if_gfpgan: false

  # 后期处理配置
  postprocess:
    enable_subtitle: true
    enable_bgm: true
    bgm_volume: 0.3
    enable_cover: false

# 输出配置
output:
  # 输出目录
  dir: "output"

  # 临时文件目录
  temp_dir: "temp"

  # 格式
  format: "mp4"

  # 质量: low, medium, high
  quality: "high"

# 日志配置
logging:
  level: "INFO"
  file: "logs/app.log"